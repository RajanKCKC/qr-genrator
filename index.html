<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Responsive</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
        font-family: 'Inter', Arial, sans-serif;
        color: #0f172a;
        padding: 20px;
      }
      .card {
        width: min(820px, 100%);
        background: white;
        border-radius: 30px;
        padding: 36px;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.1);
      }
      .layout {
        display: grid;
        gap: 26px;
      }
      .layout-two {
        display: grid;
        gap: 26px;
        grid-template-columns: 1.2fr 0.8fr;
      }
      h1 {
        margin: 0 0 10px;
      }
      p.lead {
        margin: 0;
        color: #475569;
      }
      label {
        display: block;
        margin-bottom: 12px;
        font-weight: 700;
      }
      input,
      select,
      button {
        width: 100%;
        border-radius: 16px;
        padding: 16px 18px;
        border: 1px solid #cbd5e1;
        font-size: 1rem;
      }
      button {
        background: #2563eb;
        border: none;
        color: white;
        cursor: pointer;
      }
      @media (max-width: 720px) {
        .layout-two {
          grid-template-columns: 1fr;
        }
      }
      .result {
        background: #f8fbff;
        border: 1px solid #dbeafe;
        border-radius: 24px;
        padding: 24px;
      }
      .result img {
        width: 100%;
        max-width: 320px;
        border-radius: 20px;
      }
      .actions {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .actions button,
      .actions a {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <div class="layout">
        <div>
          <h1>QR Code Generator</h1>
        </div>

        <div class="layout-two">
          <div>
            <label for="qr-text">Text or URL</label>
            <input id="qr-text" type="text" placeholder="https://your-site.com" />
            <label for="qr-size">Size</label>
            <select id="qr-size">
              <option value="220">220 x 220</option>
              <option value="320" selected>320 x 320</option>
              <option value="420">420 x 420</option>
            </select>
            <button id="generate">Generate QR</button>
          </div>

          <div id="result" class="result" hidden>
            <strong>QR Preview</strong>
            <p id="result-text"></p>
            <img id="qr-image" alt="Generated QR code" src="" />
            <div class="actions">
              <button id="copy-text">Copy Text</button>
              <a id="download-link" download="qr-code.png"><button type="button">Download</button></a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      const textInput = document.getElementById('qr-text');
      const sizeSelect = document.getElementById('qr-size');
      const generateButton = document.getElementById('generate');
      const resultSection = document.getElementById('result');
      const qrImage = document.getElementById('qr-image');
      const resultText = document.getElementById('result-text');
      const copyButton = document.getElementById('copy-text');
      const downloadLink = document.getElementById('download-link');

      function buildQrUrl(value, size) {
        return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}`;
      }

      generateButton.addEventListener('click', () => {
        const text = textInput.value.trim();
        const size = sizeSelect.value;
        if (!text) {
          alert('Add text or a URL to generate the QR code.');
          return;
        }

        resultText.textContent = text;
        const url = buildQrUrl(text, size);
        qrImage.src = url;
        downloadLink.href = url;
        resultSection.hidden = false;
      });

      copyButton.addEventListener('click', async () => {
        const text = textInput.value.trim();
        if (!text) return;
        await navigator.clipboard.writeText(text);
        copyButton.textContent = 'Copied!';
        setTimeout(() => {
          copyButton.textContent = 'Copy Text';
        }, 1400);
      });
    </script>
  </body>
</html>
