<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Better Style</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: 'Inter', Arial, sans-serif;
        background: #eef2ff;
        color: #111827;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .panel {
        width: min(600px, 100%);
        border-radius: 28px;
        background: radial-gradient(circle at top left, #ffffff 0%, #eef2ff 40%, #f8fafc 100%);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        padding: 32px;
      }
      .top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 2.5vw, 2.4rem);
      }
      p.lead {
        margin: 8px 0 0;
        color: #475569;
      }
      .field {
        display: grid;
        gap: 12px;
        margin-bottom: 22px;
      }
      input {
        width: 100%;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid #cbd5e1;
        outline: none;
        transition: border-color 0.2s ease;
      }
      input:focus {
        border-color: #6366f1;
      }
      button {
        width: min(220px, 100%);
        padding: 16px 18px;
        border-radius: 16px;
        border: none;
        background: #6366f1;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }
      button:hover {
        background: #4f46e5;
        transform: translateY(-1px);
      }
      #preview {
        margin-top: 24px;
        padding: 22px;
        border-radius: 22px;
        background: #ffffff;
        border: 1px solid rgba(99, 102, 241, 0.14);
      }
      #preview strong {
        display: block;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="top">
        <div>
          <h1>QR Code Generator</h1>
          <p class="lead">Version 6: Stronger styling, smooth spacing, and modern layout.</p>
        </div>
      </div>

      <div class="field">
        <label for="qr-text">Text or URL</label>
        <input id="qr-text" type="text" placeholder="Enter something memorable" />
      </div>
      <button id="generate">Generate QR</button>

      <div id="preview">
        <strong>Preview</strong>
        <p id="preview-text">Click the button to see a preview before the real QR will appear.</p>
      </div>
    </section>

    <script>
      const generateButton = document.getElementById('generate');
      const qrText = document.getElementById('qr-text');
      const previewText = document.getElementById('preview-text');

      generateButton.addEventListener('click', () => {
        const value = qrText.value.trim();
        if (!value) {
          previewText.textContent = 'Your QR code content needs at least one character.';
          return;
        }
        previewText.textContent = `Ready to generate a QR code for: ${value}`;
      });
    </script>
  </body>
</html>
