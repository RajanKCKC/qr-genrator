<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Basic HTML</title>
  </head>
  <body>
    <header>
      <h1>QR Code Generator</h1>
      <p>Version 1: Basic HTML setup.</p>
    </header>

    <main>
      <label for="text-input">Enter text for your QR code:</label>
      <input id="text-input" type="text" placeholder="Type something..." />
      <button type="button">Generate</button>
      <p>QR code preview will appear here in later versions.</p>
    </main>
  </body>
</html>
