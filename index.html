<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Polished</title>
    <style>
      :root {
        color-scheme: dark light;
        font-family: 'Inter', Arial, sans-serif;
        background: #eff6ff;
        color: #0f172a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }
      .frame {
        width: min(960px, 100%);
        border-radius: 36px;
        overflow: hidden;
        background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.14), transparent 28%),
          linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        box-shadow: 0 30px 100px rgba(15, 23, 42, 0.16);
      }
      .hero {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 32px;
        padding: 44px;
      }
      .hero-left {
        display: grid;
        gap: 18px;
      }
      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 3vw, 3.4rem);
      }
      p.lead {
        margin: 0;
        max-width: 550px;
        color: #334155;
        line-height: 1.7;
      }
      .panel {
        display: grid;
        gap: 20px;
      }
      .field {
        display: grid;
        gap: 10px;
      }
      input,
      select,
      button {
        width: 100%;
        border-radius: 18px;
        padding: 16px 18px;
        font-size: 1rem;
        border: 1px solid #cbd5e1;
        background: white;
      }
      button {
        color: white;
        background: linear-gradient(135deg, #4338ca, #2563eb);
        border: none;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 32px rgba(59, 130, 246, 0.22);
      }
      .result {
        display: grid;
        gap: 16px;
        background: #f8fbff;
        border-radius: 26px;
        padding: 26px;
        border: 1px solid #dbeafe;
      }
      .result img {
        width: 100%;
        max-width: 340px;
        border-radius: 22px;
      }
      .actions {
        display: grid;
        gap: 14px;
      }
      .actions button,
      .actions a {
        width: 100%;
      }
      @media (max-width: 860px) {
        .hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <article class="frame">
      <div class="hero">
        <div class="hero-left">
          <h1>Polished QR Code Generator</h1>
          <p class="lead">Version 12: Smooth animations, polished UX, theme-ready styling, and complete QR generation with copy/download support.</p>
        </div>

        <div class="panel">
          <div class="field">
            <label for="qr-text">Enter text or URL</label>
            <input id="qr-text" type="text" placeholder="https://your-site.com" />
          </div>
          <div class="field">
            <label for="qr-size">Image size</label>
            <select id="qr-size">
              <option value="220">220 x 220</option>
              <option value="320" selected>320 x 320</option>
              <option value="420">420 x 420</option>
            </select>
          </div>
          <div class="field">
            <label for="qr-color">QRCode color</label>
            <select id="qr-color">
              <option value="000000">Black</option>
              <option value="1e3a8a">Indigo</option>
              <option value="047857">Teal</option>
              <option value="b91c1c">Crimson</option>
            </select>
          </div>
          <button id="generate">Generate QR Code</button>

          <div class="result" id="result" hidden>
            <strong>Your QR Preview</strong>
            <p id="result-text"></p>
            <img id="qr-image" alt="Generated QR code" src="" />
            <div class="actions">
              <button id="copy-text">Copy QR content</button>
              <a id="download-link" download="qr-code.png"><button type="button">Download PNG</button></a>
            </div>
          </div>
        </div>
      </div>
    </article>

    <script>
      const qrText = document.getElementById('qr-text');
      const qrSize = document.getElementById('qr-size');
      const qrColor = document.getElementById('qr-color');
      const generateButton = document.getElementById('generate');
      const resultSection = document.getElementById('result');
      const qrImage = document.getElementById('qr-image');
      const resultText = document.getElementById('result-text');
      const copyText = document.getElementById('copy-text');
      const downloadLink = document.getElementById('download-link');

      function buildQrUrl(text, size, color) {
        return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&color=${color}&data=${encodeURIComponent(text)}`;
      }

      generateButton.addEventListener('click', () => {
        const text = qrText.value.trim();
        const size = qrSize.value;
        const color = qrColor.value;

        if (!text) {
          alert('Please enter text or a URL to generate a QR code.');
          return;
        }

        const url = buildQrUrl(text, size, color);
        qrImage.src = url;
        downloadLink.href = url;
        resultText.textContent = `Encoding: ${text}`;
        resultSection.hidden = false;
      });

      copyText.addEventListener('click', async () => {
        const text = qrText.value.trim();
        if (!text) return;
        await navigator.clipboard.writeText(text);
        copyText.textContent = 'Copied!';
        setTimeout(() => {
          copyText.textContent = 'Copy QR content';
        }, 1400);
      });
    </script>
  </body>
</html>
