<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Full Featured</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7ff 0%, #ffffff 100%);
        font-family: 'Inter', Arial, sans-serif;
        color: #0f172a;
        padding: 20px;
      }
      .shell {
        width: min(900px, 100%);
        border-radius: 32px;
        padding: 40px;
        background: white;
        box-shadow: 0 26px 90px rgba(15, 23, 42, 0.14);
      }
      .header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
      h1 {
        margin: 0;
      }
      p.lead {
        margin: 0;
        color: #475569;
        max-width: 520px;
      }
      .layout {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 28px;
        margin-top: 32px;
      }
      .panel {
        display: grid;
        gap: 18px;
      }
      .field {
        display: grid;
        gap: 10px;
      }
      .field label {
        font-weight: 700;
      }
      input,
      select,
      button {
        width: 100%;
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 1rem;
        border: 1px solid #d1d5db;
      }
      button {
        cursor: pointer;
        background: #4338ca;
        color: white;
        border: none;
      }
      button:hover {
        background: #3730a3;
      }
      .result {
        background: #f8faff;
        border: 1px solid #dbeafe;
        border-radius: 26px;
        padding: 24px;
      }
      .result img {
        width: 100%;
        max-width: 320px;
        margin-top: 18px;
        border-radius: 20px;
      }
      .actions {
        display: grid;
        gap: 14px;
      }
      .actions button,
      .actions a {
        width: 100%;
      }
      @media (max-width: 840px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <div class="header">
        <div>
          <h1>QR Code Generator</h1>
          
        </div>
      </div>

      <div class="layout">
        <div class="panel">
          <div class="field">
            <label for="qr-text">Text or URL</label>
            <input id="qr-text" type="text" placeholder="https://example.com" />
          </div>
          <div class="field">
            <label for="qr-size">Size</label>
            <select id="qr-size">
              <option value="220">220 x 220</option>
              <option value="320" selected>320 x 320</option>
              <option value="420">420 x 420</option>
            </select>
          </div>
          <div class="field">
            <label for="qr-color">Color</label>
            <select id="qr-color">
              <option value="000000">Black</option>
              <option value="1f2937" selected>Slate</option>
              <option value="0b5394">Blue</option>
              <option value="15803d">Green</option>
              <option value="9d174d">Red</option>
            </select>
          </div>
          <button id="generate">Generate QR</button>
        </div>

        <div class="result" id="result" hidden>
          <h2>QR Preview</h2>
          <p id="result-text"></p>
          <img id="qr-image" alt="Generated QR code" src="" />
          <div class="actions">
            <button id="copy-text">Copy text</button>
            <a id="download-link" download="qr-code.png"><button type="button">Download PNG</button></a>
          </div>
        </div>
      </div>
    </section>

    <script>
      const textInput = document.getElementById('qr-text');
      const sizeSelect = document.getElementById('qr-size');
      const colorSelect = document.getElementById('qr-color');
      const generateButton = document.getElementById('generate');
      const resultSection = document.getElementById('result');
      const qrImage = document.getElementById('qr-image');
      const resultText = document.getElementById('result-text');
      const copyButton = document.getElementById('copy-text');
      const downloadLink = document.getElementById('download-link');

      function buildQrUrl(value, size, color) {
        return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&color=${color}&data=${encodeURIComponent(value)}`;
      }

      generateButton.addEventListener('click', () => {
        const text = textInput.value.trim();
        const size = sizeSelect.value;
        const color = colorSelect.value;

        if (!text) {
          alert('Please enter text or a link.');
          return;
        }

        resultText.textContent = `QR content: ${text}`;
        const url = buildQrUrl(text, size, color);
        qrImage.src = url;
        downloadLink.href = url;
        resultSection.hidden = false;
      });

      copyButton.addEventListener('click', async () => {
        const text = textInput.value.trim();
        if (!text) return;
        await navigator.clipboard.writeText(text);
        copyButton.textContent = 'Copied!';
        setTimeout(() => {
          copyButton.textContent = 'Copy text';
        }, 1400);
      });
    </script>
  </body>
</html>
