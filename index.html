<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Functional</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #eef2ff;
        font-family: 'Inter', Arial, sans-serif;
        color: #0f172a;
      }
      .card {
        width: min(680px, 100%);
        background: white;
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 22px 60px rgba(15, 23, 42, 0.08);
      }
      input,
      button {
        width: 100%;
        border-radius: 16px;
        padding: 15px 18px;
        border: 1px solid #cbd5e1;
        font-size: 1rem;
      }
      button {
        margin-top: 16px;
        background: #4338ca;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background: #3730a3;
      }
      #result {
        margin-top: 24px;
        padding: 24px;
        border-radius: 22px;
        background: #f8fafc;
        border: 1px solid #c7d2fe;
      }
      #qr-image {
        display: block;
        max-width: 100%;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>QR Code Generator</h1>
      <p>Fully functional QR generation with live image preview.</p>

      <label for="qr-text">Enter text or URL</label>
      <input id="qr-text" type="text" placeholder="https://example.com" />
      <button id="generate">Generate QR Code</button>

      <div id="result" hidden>
        <strong>Your QR Code</strong>
        <img id="qr-image" alt="QR code preview" src="" />
      </div>
    </div>

    <script>
      const textInput = document.getElementById('qr-text');
      const generateButton = document.getElementById('generate');
      const resultSection = document.getElementById('result');
      const qrImage = document.getElementById('qr-image');

      function createQrImage(value) {
        const size = 280;
        const encoded = encodeURIComponent(value);
        return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encoded}`;
      }

      generateButton.addEventListener('click', () => {
        const value = textInput.value.trim();
        if (!value) {
          alert('Please enter text or a link to generate a QR code.');
          return;
        }

        qrImage.src = createQrImage(value);
        resultSection.hidden = false;
      });
    </script>
  </body>
</html>
