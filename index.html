<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Modern UI</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top left, #eef2ff 0%, #ffffff 40%, #f8fafc 100%);
        font-family: 'Inter', Arial, sans-serif;
        color: #0f172a;
      }
      .card {
        width: min(720px, 100%);
        border-radius: 30px;
        padding: 36px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 26px 70px rgba(15, 23, 42, 0.12);
      }
      .grid {
        display: grid;
        gap: 24px;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
      }
      header h1 {
        margin: 0;
        font-size: clamp(2rem, 2.5vw, 2.6rem);
      }
      p.lead {
        margin: 8px 0 0;
        color: #475569;
      }
      .form-group {
        display: grid;
        gap: 16px;
      }
      input,
      button,
      select {
        width: 100%;
        border-radius: 16px;
        padding: 16px 18px;
        border: 1px solid #cbd5e1;
        font-size: 1rem;
      }
      button {
        border: none;
        background: #313cee;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background: #1f2dc4;
      }
      .result {
        display: grid;
        gap: 18px;
        padding: 26px;
        border-radius: 24px;
        background: #f8fbff;
        border: 1px solid #dbeafe;
      }
      .result img {
        max-width: 100%;
        border-radius: 18px;
      }
      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .controls button {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <div class="grid">
        <header>
          <div>
            <h1>QR Code Generator</h1>
            <p class="lead">Modern UI with copy and download actions.</p>
          </div>
        </header>

        <div class="form-group">
          <label for="qr-text">Your text or link</label>
          <input id="qr-text" type="text" placeholder="Enter anything to convert into QR" />
          <button id="generate">Generate</button>
        </div>

        <div id="result" class="result" hidden>
          <div>
            <strong>Generated QR Code</strong>
            <p id="result-text"></p>
          </div>
          <img id="qr-image" alt="Generated QR code" src="" />
          <div class="controls">
            <button id="copy-text">Copy Text</button>
            <a id="download-link" download="qr-code.png">
              <button type="button">Download PNG</button>
            </a>
          </div>
        </div>
      </div>
    </section>

    <script>
      const textInput = document.getElementById('qr-text');
      const generateButton = document.getElementById('generate');
      const resultSection = document.getElementById('result');
      const qrImage = document.getElementById('qr-image');
      const resultText = document.getElementById('result-text');
      const copyButton = document.getElementById('copy-text');
      const downloadLink = document.getElementById('download-link');

      function buildQrUrl(value, size = 320) {
        return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}`;
      }

      generateButton.addEventListener('click', () => {
        const value = textInput.value.trim();
        if (!value) {
          alert('Enter some text or a URL first.');
          return;
        }

        resultText.textContent = value;
        const url = buildQrUrl(value);
        qrImage.src = url;
        downloadLink.href = url;
        resultSection.hidden = false;
      });

      copyButton.addEventListener('click', async () => {
        const value = textInput.value.trim();
        if (!value) {
          return;
        }
        await navigator.clipboard.writeText(value);
        copyButton.textContent = 'Copied!';
        setTimeout(() => {
          copyButton.textContent = 'Copy Text';
        }, 1400);
      });
    </script>
  </body>
</html>
