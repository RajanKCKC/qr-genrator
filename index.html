<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Script Added</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f4f6fb;
        color: #1f2937;
      }
      main {
        max-width: 460px;
        margin: 0 auto;
      }
      .card {
        background: #fff;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      }
      input,
      button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }
      button {
        background: #2563eb;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background: #1e40af;
      }
      #result {
        margin-top: 18px;
        padding: 14px;
        background: #eff6ff;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>QR Code Generator</h1>
        <p>Version 4: Script added to show typed text in the preview area.</p>

        <label for="qr-text">Enter text or link</label>
        <input id="qr-text" type="text" placeholder="Start typing..." />
        <button id="generate">Generate QR</button>

        <div id="result">
          <strong>Preview</strong>
          <p id="preview-text">No input yet.</p>
        </div>
      </div>
    </main>

    <script>
      const generateButton = document.getElementById('generate');
      const qrText = document.getElementById('qr-text');
      const previewText = document.getElementById('preview-text');

      generateButton.addEventListener('click', () => {
        const value = qrText.value.trim();
        if (!value) {
          previewText.textContent = 'Please enter text or a link to generate a QR code.';
          return;
        }
        previewText.textContent = `QR content: ${value}`;
      });
    </script>
  </body>
</html>
