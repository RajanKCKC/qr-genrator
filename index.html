<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Generator - Better HTML</title>
    <style>
      body {
        font-family: 'Inter', Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eef2ff 0%, #ffffff 100%);
        color: #111827;
      }
      .container {
        width: min(520px, 100%);
        padding: 30px;
      }
      .card {
        background: #ffffff;
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 16px 50px rgba(17, 24, 39, 0.08);
      }
      h1 {
        margin-top: 0;
      }
      .field {
        display: grid;
        gap: 10px;
        margin-bottom: 20px;
      }
      input,
      button {
        width: 100%;
        border-radius: 14px;
        border: 1px solid #d1d5db;
        padding: 14px 16px;
        font-size: 1rem;
      }
      button {
        background: #4f46e5;
        border: none;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        background: #4338ca;
      }
      #preview {
        padding: 20px;
        background: #f8fafc;
        border-radius: 18px;
        border: 1px dashed #c7d2fe;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="card">
        <h1>QR Code Generator</h1>
        <p>Version 5: Better HTML structure, labels, and preview card.</p>

        <div class="field">
          <label for="qr-text">Enter your text or URL</label>
          <input id="qr-text" type="text" placeholder="https://example.com" />
        </div>
        <button id="generate">Generate QR</button>

        <div id="preview">
          <h2>Preview</h2>
          <p id="preview-text">Fill the field and click generate to preview your QR content.</p>
        </div>
      </section>
    </div>

    <script>
      const generateButton = document.getElementById('generate');
      const qrText = document.getElementById('qr-text');
      const previewText = document.getElementById('preview-text');

      generateButton.addEventListener('click', () => {
        const value = qrText.value.trim();
        previewText.textContent = value ? `Ready to generate: ${value}` : 'Please add text or a URL above.';
      });
    </script>
  </body>
</html>
